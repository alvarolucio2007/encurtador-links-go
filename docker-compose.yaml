services:
  app:
    build: .
    container_name: encurtador_api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
          condition: service_healthy
      redis:
        condition: service_started
  postgres:
    image: postgres:15-alpine
    container_name: pg_encurtador
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U user -d shortener"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shortener
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_encurtador
    ports:
      - "6379:6379"

volumes:
  pgdata:
